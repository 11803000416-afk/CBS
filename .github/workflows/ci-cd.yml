name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: cbs_test
          MYSQL_USER: cbs_user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mysql, pdo, pdo_mysql, bcmath, ctype, fileinfo, json, mbstring, openssl, tokenizer, xml, curl, gd, xml
        coverage: xdebug
    
    - name: Copy .env file
      run: cp .env.example .env.testing || echo "No .env.example found"
    
    - name: Install Composer dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --prefer-dist
    
    - name: Generate app key
      run: php artisan key:generate --env=testing
    
    - name: Wait for MySQL
      run: |
        until mysqladmin ping -h="127.0.0.1" -u"cbs_user" -p"password" --silent; do
          echo 'waiting for mysql...'
          sleep 1
        done
    
    - name: Run migrations
      env:
        DB_HOST: 127.0.0.1
        DB_DATABASE: cbs_test
        DB_USERNAME: cbs_user
        DB_PASSWORD: password
      run: php artisan migrate --env=testing
    
    - name: Run tests
      env:
        DB_HOST: 127.0.0.1
        DB_DATABASE: cbs_test
        DB_USERNAME: cbs_user
        DB_PASSWORD: password
      run: php artisan test --stopOnFailure
    
    - name: Code quality check - PHP Lint
      run: |
        find app -name "*.php" -exec php -l {} \; 2>&1 | grep -i "parse error" && exit 1 || echo "✓ PHP Syntax OK"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: tests/

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install npm dependencies
      run: npm ci --no-audit --no-fund
    
    - name: Build assets
      run: npm run build
    
    - name: Verify build artifacts
      run: |
        test -f public/build/manifest.json || (echo "✗ Build failed: no manifest.json" && exit 1)
        echo "✓ Build successful"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: public/build/

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
    
    - name: Install Composer
      run: composer install -q --no-interaction --prefer-dist
    
    - name: Security check - PHP dependencies
      run: composer audit || true
    
    - name: Check for hardcoded secrets
      run: |
        echo "Scanning for hardcoded secrets..."
        grep -r "password\|api_key\|secret\|token" app/ || true
      continue-on-error: true

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Staging
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_STAGING }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_STAGING }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER_STAGING }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_STAGING }}
      run: |
        echo "✓ Staging deployment configured"
        echo "Set these secrets in GitHub:"
        echo "  - DEPLOY_KEY_STAGING"
        echo "  - DEPLOY_HOST_STAGING"
        echo "  - DEPLOY_USER_STAGING"
        echo "  - DEPLOY_PATH_STAGING"
    
    - name: Notify deployment
      run: echo "✓ Ready to deploy to staging (configure secrets in GitHub Actions)"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Production
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_PRODUCTION }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PRODUCTION }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER_PRODUCTION }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_PRODUCTION }}
      run: |
        echo "✓ Production deployment configured"
        echo "Set these secrets in GitHub:"
        echo "  - DEPLOY_KEY_PRODUCTION"
        echo "  - DEPLOY_HOST_PRODUCTION"
        echo "  - DEPLOY_USER_PRODUCTION"
        echo "  - DEPLOY_PATH_PRODUCTION"
    
    - name: Notify deployment
      run: echo "✓ Ready to deploy to production (configure secrets in GitHub Actions)"
